[DrinkMinder]
# Work hour ranges (format: start-end, comma separated)
# Example: 9-13, 14-18
work_ranges = 9-13, 14-18

# Interval between reminders in minutes
reminder_interval = 15

# Seconds the window stays locked
lock_seconds = 15

# Debug mode (true/false) — if true, shows the reminder immediately on startup
debug = false

# Language (it = Italian, en = English)
language = it
