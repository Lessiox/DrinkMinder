[DrinkMinder]
# Fasce orarie (formato: inizio-fine, separati da virgola)
# Esempio: 9-13, 14-18
work_ranges = 9-13, 14-18

# Intervallo tra i reminder in minuti
reminder_interval = 15

# Secondi di blocco della finestra
lock_seconds = 15

# Modalità debug (true/false) — se true mostra subito il reminder
debug = true

# Lingua / Language (it = italiano, en = english)
language = it
